<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Result | NetGuard AI</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --safe: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark-bg: #020617;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            background-color: var(--dark-bg);
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(79, 172, 254, 0.05) 0%, transparent 20%);
        }

        .result-container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .url-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            word-break: break-all;
            font-family: 'Space Grotesk', sans-serif;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .status-header {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .status-value {
            font-size: 3.5rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        .status-safe { color: var(--safe); text-shadow: 0 0 30px rgba(16, 185, 129, 0.3); }
        .status-danger { color: var(--danger); text-shadow: 0 0 30px rgba(239, 68, 68, 0.3); }

        .score-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 2.5rem;
        }

        .circular-chart {
            display: block;
            margin: 10px auto;
            max-width: 100%;
            max-height: 250px;
        }

        .circle-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 2.8;
        }

        .circle {
            fill: none;
            stroke-width: 2.8;
            stroke-linecap: round;
            animation: progress 1.5s ease-out forwards;
        }

        @keyframes progress {
            0% { stroke-dasharray: 0 100; }
        }

        .circle-safe { stroke: var(--safe); }
        .circle-danger { stroke: var(--danger); }
        .circle-warning { stroke: var(--warning); }

        .percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
        }

        .percentage-label {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1rem 2rem;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            color: white;
        }

        .feature-list {
            margin-top: 3rem;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .feature-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
        }

        .feature-item:last-child { border: none; }
    </style>
</head>
<body>
    <div class="result-container">
        <div class="glass-card">
            <div class="url-box">{{ url }}</div>
            
            <div class="status-header">Security Assessment</div>
            <div class="status-value {% if result == 'Safe' %}status-safe{% else %}status-danger{% endif %}">
                {{ result | upper }}
            </div>

            <div class="score-container">
                <svg viewBox="0 0 36 36" class="circular-chart">
                    <path class="circle-bg"
                        d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                    />
                    <path class="circle {% if percentage > 80 %}circle-safe{% elif percentage > 50 %}circle-warning{% else %}circle-danger{% endif %}"
                        stroke-dasharray="{{ percentage }}, 100"
                        d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                    />
                </svg>
                <div class="percentage">{{ percentage }}%</div>
                <div class="percentage-label">Safety Score</div>
            </div>

            <p class="text-muted mb-4">Our AI model has analyzed the structural features of this URL and determined it is {{ result.lower() }}.</p>
            
            <a href="/" class="btn-action">Scan Another URL</a>
        </div>
    </div>
</body>
</html>
